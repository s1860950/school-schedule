<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор расписания</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        #root {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 900px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }

        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-family: inherit;
            font-size: 14px;
            resize: vertical;
            min-height: 120px;
            transition: border-color 0.3s;
        }

        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-group input[type="text"],
        .form-group input[type="number"],
        .form-group select {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-family: inherit;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        button {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-generate {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-generate:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-generate:active {
            transform: translateY(0);
        }

        .btn-generate:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-download {
            background: #4CAF50;
            color: white;
        }

        .btn-download:hover {
            background: #45a049;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(76, 175, 80, 0.3);
        }

        .btn-download:active {
            transform: translateY(0);
        }

        .btn-download:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .btn-reset {
            background: #ff9800;
            color: white;
        }

        .btn-reset:hover {
            background: #e68900;
        }

        .loader {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .result-section {
            margin-top: 30px;
            padding: 20px;
            background: #f5f5f5;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }

        .result-section h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 16px;
        }

        .result-text {
            color: #555;
            line-height: 1.6;
            white-space: pre-wrap;
            word-wrap: break-word;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            max-height: 400px;
            overflow-y: auto;
            padding: 15px;
            background: white;
            border-radius: 6px;
            border: 1px solid #ddd;
        }

        .error-message {
            color: #d32f2f;
            padding: 12px;
            background: #ffebee;
            border-radius: 6px;
            margin-top: 10px;
            border-left: 4px solid #d32f2f;
        }

        .success-message {
            color: #388e3c;
            padding: 12px;
            background: #e8f5e9;
            border-radius: 6px;
            margin-top: 10px;
            border-left: 4px solid #388e3c;
        }

        .settings-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .setting-item {
            display: flex;
            flex-direction: column;
        }

        .setting-item label {
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 13px;
        }

        .setting-item input,
        .setting-item select {
            padding: 8px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 13px;
        }

        .setting-item input:focus,
        .setting-item select:focus {
            outline: none;
            border-color: #667eea;
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .settings-grid {
                grid-template-columns: 1fr;
            }

            .button-group {
                flex-direction: column;
            }

            .header h1 {
                font-size: 22px;
            }
        }

        .note {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
        }

        .separator {
            height: 1px;
            background: #e0e0e0;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const DEFAULT_PROMPT = "Сгенерируй расписание на неделю для начальных классов (всего 1-4 - 4 класса), на 5 дней в неделю. Предметы - изо, труд, физкультура, музыка - не должны накладываться друг на друга. У 1го класса максимум 5 уроков, у других - 6. У каждого класса свой классный руководитель. Предметы не доложны повторяться в один день для одного класса. Расписание должно быть в виде таблицы с указанием времени, предмета и классного руководителя. Время уроков: 8:30-9:15, 9:30-10:15, 10:30-11:15, 11:30-12:15, 13:00-13:45, 14:00-14:45.";

        const DEFAULT_SYSTEM_PROMPT = "Ты - полезный AI ассистент.";

        function ScheduleGenerator() {
            const [prompt, setPrompt] = useState(DEFAULT_PROMPT);
            const [systemPrompt, setSystemPrompt] = useState(DEFAULT_SYSTEM_PROMPT);
            const [maxTokens, setMaxTokens] = useState(700);
            const [temperature, setTemperature] = useState(0.7);
            const [provider, setProvider] = useState("yandexgpt");
            const [loading, setLoading] = useState(false);
            const [result, setResult] = useState(null);
            const [error, setError] = useState(null);

            const providers = [
                { value: "yandexgpt", label: "YandexGPT" },
                { value: "gigachat", label: "GigaChat" },
                { value: "openai", label: "OpenAI" },
                { value: "deepseek", label: "DeepSeek" },
                { value: "huggingface", label: "Hugging Face" }
            ];

            const generateSchedule = async () => {
                setLoading(true);
                setError(null);

                try {
                    const response = await fetch("/api/v1/generate", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json",
                        },
                        body: JSON.stringify({
                            prompt: prompt || DEFAULT_PROMPT,
                            system_prompt: systemPrompt || DEFAULT_SYSTEM_PROMPT,
                            max_tokens: parseInt(maxTokens),
                            temperature: parseFloat(temperature),
                            provider: provider
                        })
                    });

                    if (!response.ok) {
                        throw new Error(`Ошибка сервера: ${response.status}`);
                    }

                    const data = await response.json();

                    if (data.success) {
                        setResult({
                            text: data.generated_text,
                            provider: data.provider,
                            model: data.model,
                            tokens_used: data.tokens_used
                        });
                    } else {
                        setError(data.error || "Не удалось сгенерировать расписание");
                    }
                } catch (err) {
                    setError(`Ошибка при генерировании: ${err.message}`);
                }

                setLoading(false);
            };

            const downloadExcel = async () => {
                if (!result || !result.text) return;

                try {
                    const response = await fetch("/api/v1/generate-excel", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json",
                        },
                        body: JSON.stringify({
                            schedule_text: result.text
                        })
                    });

                    if (!response.ok) {
                        throw new Error(`Ошибка при создании Excel: ${response.status}`);
                    }

                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement("a");
                    a.href = url;
                    a.download = `schedule_${new Date().toISOString().split('T')[0]}.xlsx`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    window.URL.revokeObjectURL(url);
                } catch (err) {
                    setError(`Ошибка при скачивании: ${err.message}`);
                }
            };

            const resetForm = () => {
                setPrompt(DEFAULT_PROMPT);
                setSystemPrompt(DEFAULT_SYSTEM_PROMPT);
                setResult(null);
                setError(null);
            };

            return (
                <div className="container">
                    <div className="header">
                        <h1>📅 Генератор расписания</h1>
                        <p>Используйте ИИ для автоматического создания школьного расписания</p>
                    </div>

                    <div className="form-group">
                        <label htmlFor="prompt">Основной промпт</label>
                        <textarea
                            id="prompt"
                            value={prompt}
                            onChange={(e) => setPrompt(e.target.value)}
                            placeholder="Введите основной промпт для генерирования расписания..."
                            disabled={loading}
                        />
                        <span className="note">Это текст, на основе которого ИИ будет генерировать расписание</span>
                    </div>

                    <div className="form-group">
                        <label htmlFor="systemPrompt">Системный промпт</label>
                        <textarea
                            id="systemPrompt"
                            value={systemPrompt}
                            onChange={(e) => setSystemPrompt(e.target.value)}
                            placeholder="Введите системный промпт..."
                            disabled={loading}
                            style={{ minHeight: "80px" }}
                        />
                    </div>

                    <div className="separator"></div>

                    <div className="settings-grid">
                        <div className="setting-item">
                            <label htmlFor="provider">Провайдер ИИ</label>
                            <select
                                id="provider"
                                value={provider}
                                onChange={(e) => setProvider(e.target.value)}
                                disabled={loading}
                            >
                                {providers.map(p => (
                                    <option key={p.value} value={p.value}>{p.label}</option>
                                ))}
                            </select>
                        </div>

                        <div className="setting-item">
                            <label htmlFor="maxTokens">Макс токенов</label>
                            <input
                                id="maxTokens"
                                type="number"
                                value={maxTokens}
                                onChange={(e) => setMaxTokens(e.target.value)}
                                min="1"
                                max="5000"
                                disabled={loading}
                            />
                        </div>

                        <div className="setting-item">
                            <label htmlFor="temperature">Температура</label>
                            <input
                                id="temperature"
                                type="number"
                                value={temperature}
                                onChange={(e) => setTemperature(e.target.value)}
                                min="0.1"
                                max="1"
                                step="0.1"
                                disabled={loading}
                            />
                        </div>
                    </div>

                    <div className="button-group">
                        <button
                            className="btn-generate"
                            onClick={generateSchedule}
                            disabled={loading}
                        >
                            {loading ? (
                                <span className="loading-text">
                                    <span className="loader"></span>
                                    Генерирование...
                                </span>
                            ) : (
                                "🚀 Сгенерировать расписание"
                            )}
                        </button>

                        {result && (
                            <button
                                className="btn-download"
                                onClick={downloadExcel}
                            >
                                ⬇️ Скачать Excel
                            </button>
                        )}

                        <button
                            className="btn-reset"
                            onClick={resetForm}
                            disabled={loading}
                        >
                            ↻ Сброс
                        </button>
                    </div>

                    {error && (
                        <div className="error-message">
                            <strong>❌ Ошибка:</strong> {error}
                        </div>
                    )}

                    {result && (
                        <div className="result-section">
                            <h3>📊 Сгенерированное расписание</h3>
                            <div style={{ marginBottom: "10px", fontSize: "13px", color: "#666" }}>
                                Провайдер: <strong>{result.provider}</strong> | Модель: <strong>{result.model}</strong>
                                {result.tokens_used && ` | Токенов: ${result.tokens_used}`}
                            </div>
                            <div className="result-text">{result.text}</div>
                            <div className="success-message" style={{ marginTop: "15px" }}>
                                ✅ Расписание успешно сгенерировано! Нажмите "Скачать Excel" для экспорта.
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<ScheduleGenerator />);
    </script>
</body>
</html>
