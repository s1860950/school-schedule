        const DEFAULT_PROMPT = `Сгенерируй расписание занятий на всю неделю (понедельник-пятница) для начальных классов (1-4 классы).

        const DEFAULT_SYSTEM_PROMPT = "Ты - эксперт в создании школьного расписания. Твоя задача - генерировать понятные и практичные расписания занятий на полную неделю. Всегда выводи расписание в виде четких markdown таблиц с вертикальными разделителями. Убедись, что предметы распределены логично, разнообразно от дня к дню и не накладываются друг на друга для специальных предметов. ВАЖНО: 'Разговоры о важном' ДОЛЖНО быть ТОЛЬКО в понедельник в 8:30-9:15 у ВСЕХ классов. ВО ВСЕ ОСТАЛЬНЫЕ ДНИ этого предмета НЕ ДОЛЖНО БЫТЬ ВООБЩЕ! КРИТИЧНО: Физкультура, Музыка и Изобразительное искусство ДОЛЖНЫ быть в РАЗНЫЕ ВРЕМЕНА для разных классов! Когда один класс на физкультуре, другие классы НЕ могут быть на музыке или изо в это же время!";

        // Функция для парсинга расписания из текста
        function parseScheduleTable(text) {
            const timePattern = /^\d{1,2}:\d{2}\s*[-–—]\s*\d{1,2}:\d{2}$/;
            const lines = text.replace(/\r/g, '').split('\n');

            const normalizeTitle = (line) => (
                line
                    .replace(/^#{1,6}\s*/, '')
                    .replace(/^\*\*\s*/, '')
                    .replace(/\s*\*\*$/, '')
                    .trim()
            );

            const splitMarkdownRow = (line) => {
                const trimmed = line.trim();
                const cells = trimmed.split('|').map(cell => cell.trim());

                if (trimmed.startsWith('|')) {
                    cells.shift();
                }

                if (trimmed.endsWith('|')) {
                    cells.pop();
                }

                return cells;
            };

            const isSeparatorRow = (line) => {
                const stripped = line.replace(/\s/g, '').replace(/[|:]/g, '');
                return stripped.length > 0 && /^-+$/.test(stripped);
            };

            const normalizeTime = (value) => (
                value
                    .replace(/[–—]/g, '-')
                    .replace(/\s*-\s*/g, '-')
                    .trim()
            );

            const groupedData = [];
            let headers = [];
            let pendingTitle = '';
            let currentDay = '';
            let currentHeaders = [];
            let currentRows = [];

            const flushCurrentGroup = () => {
                if (!currentDay || currentRows.length === 0) {
                    return;
                }

                groupedData.push({
                    day: currentDay,
                    rows: currentRows
                });

                currentDay = '';
                currentHeaders = [];
                currentRows = [];
            };

            lines.forEach((rawLine) => {
                const line = rawLine.trim();

                if (!line) {
                    return;
                }

                if (!line.includes('|')) {
                    if (currentRows.length > 0) {
                        flushCurrentGroup();
                    }

                    pendingTitle = normalizeTitle(line);
                    return;
                }

                if (isSeparatorRow(line)) {
                    return;
                }

                const cells = splitMarkdownRow(line);
                if (cells.length < 2) {
                    return;
                }

                const normalizedCells = cells.map(cell => cell.trim());
                const firstCell = normalizeTime(normalizedCells[0]);

                if (!currentDay) {
                    currentDay = pendingTitle || `День ${groupedData.length + 1}`;
                }

                if (currentHeaders.length === 0 && !timePattern.test(firstCell)) {
                    currentHeaders = normalizedCells;
                    if (headers.length === 0) {
                        headers = normalizedCells;
                    }
                    return;
                }

                if (timePattern.test(firstCell)) {
                    currentRows.push([firstCell, ...normalizedCells.slice(1)]);
                }
            });

            flushCurrentGroup();

            const maxColumns = Math.max(
                headers.length,
                ...groupedData.map(group =>
                    group.rows.reduce((max, row) => Math.max(max, row.length), 0)
                ),
                0
            );

            if (maxColumns === 0) {
                return {
                    headers: [],
                    groupedData: [],
                    rawText: text
                };
            }

            const finalHeaders = headers.length > 0 ? headers.slice(0, maxColumns) : ['Время'];
            while (finalHeaders.length < maxColumns) {
                finalHeaders.push(`${finalHeaders.length} класс`);
            }

            const normalizedGroups = groupedData.map(group => ({
                day: group.day,
                rows: group.rows.map(row => {
                    if (row.length >= maxColumns) {
                        return row.slice(0, maxColumns);
                    }

                    return [...row, ...Array(maxColumns - row.length).fill('')];
                })
            }));

            return {
                headers: finalHeaders,
                groupedData: normalizedGroups,
                rawText: text
            };
        }

        // Компонент для отображения таблицы расписания
        function ScheduleTableView({ text, onEditSave }) {
            const [viewMode, setViewMode] = useState('table');
            const [editMode, setEditMode] = useState(false);
            const [editData, setEditData] = useState(null);
            const { headers, groupedData, rawText } = parseScheduleTable(text);
            const hasTableData = headers.length > 0 && groupedData.length > 0;

            // Инициализировать данные для редактирования
            const initializeEditData = () => {
                const newEditData = {};
                groupedData.forEach((dayGroup, dayIdx) => {
                    dayGroup.rows.forEach((row, rowIdx) => {
                        row.forEach((cell, cellIdx) => {
                            const key = `${dayIdx}-${rowIdx}-${cellIdx}`;
                            newEditData[key] = cell;
                        });
                    });
                });
                setEditData(newEditData);
            };

            const handleEditToggle = () => {
                if (!editMode) {
                    initializeEditData();
                }
                setEditMode(!editMode);
            };

            const handleCellChange = (dayIdx, rowIdx, cellIdx, newValue) => {
                const key = `${dayIdx}-${rowIdx}-${cellIdx}`;
                setEditData(prev => ({
                    ...prev,
                    [key]: newValue
                }));
            };

            // Функция для построения отредактированного markdown текста
            const buildEditedText = () => {
                let editedText = '';
                
                groupedData.forEach((dayGroup, dayIdx) => {
                    editedText += dayGroup.day + '\n\n';
                    editedText += '| ' + headers.join(' | ') + ' |\n';
                    editedText += '|' + headers.map(() => '-------').join('|') + '|\n';
                    
                    dayGroup.rows.forEach((row, rowIdx) => {
                        const newRow = row.map((cell, cellIdx) => {
                            const key = `${dayIdx}-${rowIdx}-${cellIdx}`;
                            return editData[key] || cell;
                        });
                        editedText += '| ' + newRow.join(' | ') + ' |\n';
                    });
                    
                    editedText += '\n';
                });
                
                return editedText;
            };

            const handleSaveEdit = () => {
                const editedText = buildEditedText();
                if (onEditSave) {
                    onEditSave(editedText);
                }
                setEditMode(false);
            };

            const handleCancelEdit = () => {
                setEditData(null);
                setEditMode(false);
            };

            if (!hasTableData) {
                return (
                    <div className="schedule-raw-text">
                        {text}
                    </div>
                );
            }

            return (
                <div>
                    <div className="schedule-tabs">
                        <button 
                            className={`schedule-tab-btn ${viewMode === 'table' ? 'active' : ''}`}
                            onClick={() => setViewMode('table')}
                        >
                            📋 Таблица
                        </button>
                        <button 
                            className={`schedule-tab-btn ${viewMode === 'text' ? 'active' : ''}`}
                            onClick={() => setViewMode('text')}
                        >
                            📝 Исходный текст
                        </button>
                        <div style={{ marginLeft: 'auto', display: 'flex', gap: '8px' }}>
                            {viewMode === 'table' && (
                                <>
                                    <button
                                        className={`schedule-tab-btn ${editMode ? 'active' : ''}`}
                                        onClick={handleEditToggle}
                                        style={{ marginLeft: 'auto' }}
                                    >
                                        {editMode ? '✓ Редактирование' : '✏️ Редактировать'}
                                    </button>
                                    {editMode && (
                                        <>
                                            <button
                                                className="schedule-tab-btn"
                                                onClick={handleSaveEdit}
                                                style={{ color: '#10B981' }}
                                            >
                                                💾 Сохранить
                                            </button>
                                            <button
                                                className="schedule-tab-btn"
                                                onClick={handleCancelEdit}
                                                style={{ color: '#EF4444' }}
                                            >
                                                ❌ Отмена
                                            </button>
                                        </>
                                    )}
                                </>
                            )}
                        </div>
                    </div>

                    {viewMode === 'table' && (
                        <div className="schedule-table-shell">
                            <table className="schedule-table">
                                <thead>
                                    <tr>
                                        {headers.map((header, idx) => (
                                            <th key={idx}>
                                                {header}
                                            </th>
                                        ))}
                                    </tr>
                                </thead>
                                <tbody>
                                    {groupedData.map((dayGroup, dayGroupIdx) => (
                                        <React.Fragment key={dayGroupIdx}>
                                            <tr className="day-separator-row" data-day-separator="true">
                                                <td colSpan={headers.length}>
                                                    {dayGroup.day}
                                                </td>
                                            </tr>
                                            {dayGroup.rows.map((row, rowIdx) => (
                                                <tr
                                                    key={`${dayGroupIdx}-${rowIdx}`}
                                                    className={`schedule-data-row ${rowIdx % 2 === 1 ? 'is-alt' : ''}`}
                                                >
                                                    {row.map((cell, cellIdx) => {
                                                        let className = 'subject';
                                                        
                                                        if (cellIdx === 0) {
                                                            className = 'time-cell';
                                                        }

                                                        const key = `${dayGroupIdx}-${rowIdx}-${cellIdx}`;
                                                        const cellValue = editData ? (editData[key] || '') : cell;
                                                        
                                                        return (
                                                            <td key={cellIdx} className={className} style={editMode ? { padding: '4px' } : {}}>
                                                                {editMode && cellIdx !== 0 ? (
                                                                    <input
                                                                        type="text"
                                                                        value={cellValue}
                                                                        onChange={(e) => handleCellChange(dayGroupIdx, rowIdx, cellIdx, e.target.value)}
                                                                        style={{
                                                                            width: '100%',
                                                                            padding: '8px',
                                                                            border: '1px solid #667EEA',
                                                                            borderRadius: '4px',
                                                                            fontSize: '14px',
                                                                            fontFamily: 'inherit'
                                                                        }}
                                                                    />
                                                                ) : (
                                                                    cellValue
                                                                )}
                                                            </td>
                                                        );
                                                    })}
                                                </tr>
                                            ))}
                                        </React.Fragment>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    )}

                    {viewMode === 'text' && (
                        <div className="schedule-raw-text">
                            {rawText}
                        </div>
                    )}
                </div>
            );
        }

        function ScheduleGenerator() {
            const [prompt, setPrompt] = useState(DEFAULT_PROMPT);
            const [systemPrompt, setSystemPrompt] = useState(DEFAULT_SYSTEM_PROMPT);
            const [maxTokens, setMaxTokens] = useState(3000);
            const [temperature, setTemperature] = useState(0.7);
            const [provider, setProvider] = useState("yandexgpt");
            const [requiredSubjects, setRequiredSubjects] = useState(DEFAULT_REQUIRED_SUBJECTS);
            const [showPrompts, setShowPrompts] = useState(false);
            const [loading, setLoading] = useState(false);
            const [result, setResult] = useState(null);
            const [error, setError] = useState(null);

            const providers = [
                { value: "yandexgpt", label: "YandexGPT" },
                { value: "gigachat", label: "GigaChat" },
                { value: "openai", label: "OpenAI" },
                { value: "deepseek", label: "DeepSeek" },
                { value: "huggingface", label: "Hugging Face" }
            ];

            const generateSchedule = async () => {
                setLoading(true);
                setError(null);

                try {
                    // Формируем промпт с обязательными предметами если они указаны
                    let finalPrompt = prompt || DEFAULT_PROMPT;
                    if (requiredSubjects.trim()) {
                        const subjectsList = requiredSubjects.split(/,|;|\n/).filter(s => s.trim()).map(s => s.trim());
                        const subjectsInfo = `\n\nОБЯЗАТЕЛЬНЫЕ ПРЕДМЕТЫ, которые ДОЛЖНЫ быть в расписании каждого класса:\n${subjectsList.map((s, i) => `${i + 1}. ${s}`).join('\n')}\n\nУбедись, что все эти предметы распределены между классами разнообразно и логично!`;
                        finalPrompt = finalPrompt + subjectsInfo;
                    }

                    const response = await fetch("/api/v1/generate", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json",
                        },
                        body: JSON.stringify({
                            prompt: finalPrompt,
                            system_prompt: systemPrompt || DEFAULT_SYSTEM_PROMPT,
                            max_tokens: parseInt(maxTokens),
                            temperature: parseFloat(temperature),
                            provider: provider
                        })
                    });

                    if (!response.ok) {
                        throw new Error(`Ошибка сервера: ${response.status}`);
                    }

                    const data = await response.json();

                    if (data.success) {
                        setResult({
                            text: data.generated_text,
                            provider: data.provider,
                            model: data.model,
                            tokens_used: data.tokens_used
                        });
                    } else {
                        setError(data.error || "Не удалось сгенерировать расписание");
                    }
                } catch (err) {
                    setError(`Ошибка при генерировании: ${err.message}`);
                }

                setLoading(false);
            };

            const handleEditSave = (editedText) => {
                // Обновляем результат с отредактированным текстом
                setResult(prev => ({
                    ...prev,
                    text: editedText
                }));
                // Показываем временное уведомление
                const notification = document.createElement('div');
                notification.textContent = '✓ Изменения сохранены! Excel будет экспортирован с обновленным расписанием';
                notification.style.cssText = `
                    position: fixed;
                    bottom: 20px;
                    right: 20px;
                    background: linear-gradient(135deg, #10B981 0%, #059669 100%);
                    color: white;
                    padding: 16px 24px;
                    border-radius: 8px;
                    font-weight: 600;
                    box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
                    z-index: 1000;
                    animation: slideIn 0.3s ease;
                `;
                document.body.appendChild(notification);
                setTimeout(() => {
                    notification.style.animation = 'slideOut 0.3s ease';
                    setTimeout(() => notification.remove(), 300);
                }, 3000);
            };

            const downloadExcel = async () => {
                if (!result || !result.text) return;

                try {
                    const response = await fetch("/api/v1/generate-excel", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json",
                        },
                        body: JSON.stringify({
                            schedule_text: result.text
                        })
                    });

                    if (!response.ok) {
                        throw new Error(`Ошибка при создании Excel: ${response.status}`);
                    }

                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement("a");
                    a.href = url;
                    a.download = `schedule_${new Date().toISOString().split('T')[0]}.xlsx`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    window.URL.revokeObjectURL(url);
                } catch (err) {
                    setError(`Ошибка при скачивании: ${err.message}`);
                }
            };

            const resetForm = () => {
                setPrompt(DEFAULT_PROMPT);
                setSystemPrompt(DEFAULT_SYSTEM_PROMPT);
                setRequiredSubjects(DEFAULT_REQUIRED_SUBJECTS);
                setResult(null);
                setError(null);
            };

            return (
                <div className="container">
                    <div className="header">
                        <h1>📅 Генератор расписания</h1>
                        <p>Используйте ИИ для автоматического создания школьного расписания</p>
                    </div>

                    <button 
                        className="btn-toggle-prompts"
                        onClick={() => setShowPrompts(!showPrompts)}
                        style={{
                            marginBottom: "20px",
                            background: showPrompts ? "linear-gradient(135deg, #667EEA 0%, #764BA2 100%)" : "linear-gradient(135deg, #a0aec0 0%, #718096 100%)",
                            color: "white",
                            padding: "12px 20px",
                            border: "none",
                            borderRadius: "10px",
                            cursor: "pointer",
                            fontWeight: "600",
                            fontSize: "14px",
                            transition: "all 0.3s ease",
                            width: "auto"
                        }}
                    >
                        {showPrompts ? "🔽 Скрыть промпты" : "▶️ Показать промпты"}
                    </button>

                    {showPrompts && (
                        <>
                            <div className="form-group">
                                <label htmlFor="prompt">Основной промпт</label>
                                <textarea
                                    id="prompt"
                                    value={prompt}
                                    onChange={(e) => setPrompt(e.target.value)}
                                    placeholder="Введите основной промпт для генерирования расписания..."
                                    disabled={loading}
                                />
                                <span className="note">Это текст, на основе которого ИИ будет генерировать расписание</span>
                            </div>

                            <div className="form-group">
                                <label htmlFor="systemPrompt">Системный промпт</label>
                                <textarea
                                    id="systemPrompt"
                                    value={systemPrompt}
                                    onChange={(e) => setSystemPrompt(e.target.value)}
                                    placeholder="Введите системный промпт..."
                                    disabled={loading}
                                    style={{ minHeight: "80px" }}
                                />
                            </div>
                        </>
                    )}

                    <div className="form-group">
                        <label htmlFor="requiredSubjects">Обязательные предметы</label>
                        <textarea
                            id="requiredSubjects"
                            value={requiredSubjects}
                            onChange={(e) => setRequiredSubjects(e.target.value)}
                            placeholder="Укажите обязательные предметы, которые должны быть в расписании (каждый на новой строке или через запятую/точку с запятой). Можете добавлять, удалять или изменять предметы."
                            disabled={loading}
                            style={{ minHeight: "100px" }}
                        />
                        <span className="note">Эти предметы будут обязательно включены в расписание для всех классов. Вы можете добавлять, удалять или изменять предметы по необходимости.</span>
                    </div>

                    <div className="button-group">
                        <button
                            className="btn-generate"
                            onClick={generateSchedule}
                            disabled={loading}
                        >
                            {loading ? (
                                <span className="loading-text">
                                    <span className="loader"></span>
                                    Генерирование...
                                </span>
                            ) : (
                                "🚀 Сгенерировать расписание"
                            )}
                        </button>

                        {result && (
                            <button
                                className="btn-download"
                                onClick={downloadExcel}
                            >
                                ⬇️ Скачать Excel
                            </button>
                        )}

                        <button
                            className="btn-reset"
                            onClick={resetForm}
                            disabled={loading}
                        >
                            ↻ Сброс
                        </button>
                    </div>

                    {error && (
                        <div className="error-message">
                            <strong>❌ Ошибка:</strong> {error}
                        </div>
                    )}

                    {result && (
                        <div className="result-section">
                            <h3>📊 Сгенерированное расписание</h3>
                            <div className="schedule-info-bar">
                                <div className="schedule-info-item">
                                    Провайдер: <strong>{result.provider}</strong>
                                </div>
                                <div className="schedule-info-item">
                                    Модель: <strong>{result.model}</strong>
                                </div>
                                {result.tokens_used && (
                                    <div className="schedule-info-item">
                                        Токенов: <strong>{result.tokens_used}</strong>
                                    </div>
                                )}
                            </div>
                            
                            <ScheduleTableView text={result.text} onEditSave={handleEditSave} />
                            
                            <div className="success-message" style={{ marginTop: "15px" }}>
                                ✅ Расписание успешно сгенерировано! Нажмите "Скачать Excel" для экспорта.
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<ScheduleGenerator />);
    </script>
</body>
</html>
